academy:
  tracking_id: "[USERNAME]"
  
  # Progress through specific learning paths
  courses:
    - id: "exploratory-testing"
      status: "in-progress" # options: locked, in-progress, completed
      last_activity: "2026-03-29"
      notes: "./modules/academy/notes/exploratory.md"
    
    - id: "bug-reproduction"
      status: "locked"
      requirement: "Complete Exploratory Testing"

  # Technical standards derived from Academy modules
  bug_standards:
    functional:
      severity_levels: ["Low", "High", "Critical"]
      required_attachments: ["Screen Recording", "System Logs"]
      reporting_template: "templates/bug_report_functional.md"
    
    visual:
      required_attachments: ["Screenshot"]
      reporting_template: "templates/bug_report_visual.md"