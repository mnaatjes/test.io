- content: 'Reproduction Feature


    How to find the reproduction feature on our interface

    Written by Markus

    Updated over a month ago


    Ways to find Reproductions:

    1. Dashboard: Reproduction requests for bugs already approved by the TL in tests
    you''re participating in.

    2. Inside Bug Reports: A ''Start Reproduction'' button appears if you''re allowed
    to reproduce it.

    3. Similar Bug Reports List: When creating a bug, check the list on the right.
    If it''s already reported, click the reproduction button and stop your report.

    4. Bugs List: Use the ''Reproductions available'' toggle in the Bug list of a
    Test Cycle to see open slots.


    How to submit:

    - State if you can reproduce (Positive/Negative).

    - Select your environment.

    - Upload screencast.

    - Click ''Create reproduction''.


    How to remove:

    - Go to ''My Reproductions'' tab in the Test Cycle header.

    - Open the reproduction details.

    - Click ''Delete'' in the bottom action bar.'
