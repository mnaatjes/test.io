- content: "Bug Reproductions\n\nWhat are reproductions and what are they good for?\n\
    Written by Markus\nUpdated over a year ago\n\nReproductions are useful for customers\
    \ because they indicate which environments are concerned and if the problem is\
    \ device-specific or not. \n\nTypes:\n- Positive Reproduction: You experience\
    \ the same bug following the same steps.\n- Negative Reproduction: You cannot\
    \ reproduce the bug; function works on your device.\n- Note: If you experience\
    \ a DIFFERENT bug, do NOT submit a reproduction. Submit a new bug report.\n\n\
    Reproduction Session:\n- 30 minutes to finish the report after clicking 'Start\
    \ reproduction'.\n- Seat is reserved during this time.\n- If not submitted in\
    \ time, it expires and seat opens up.\n\nRules for Attachments:\n- Screencast\
    \ is REQUIRED.\n- Max length: 15 seconds (usually).\n- Rare exception: Longer\
    \ if triggering action takes more time, but not longer than original tester's\
    \ screencast.\n- Must include: Current date and URL bar (for websites).\n- App\
    \ Crashes: Upload crash log + screencast (timings must be coherent).\n- Compliance:\
    \ Must follow all Bug Report Attachment rules. Rejection follows non-compliance\
    \ (e.g., too long, unnecessary steps).\n- OOS Warning: Reproducing out-of-scope\
    \ bugs (e.g., live orders) leads to rejection and warning.\n\nConcurrency Rules:\n\
    - Only one task at a time.\n- Cannot run simultaneously with: Test Case, Test\
    \ Session, Bug Fix/Report Confirmation.\n\nVisibility of 'Start reproduction'\
    \ button:\n- While test is running.\n- Only for functional bug reports.\n- Only\
    \ for reports not yet reviewed by customer.\n- Only if max reproduction count\
    \ isn't reached."
