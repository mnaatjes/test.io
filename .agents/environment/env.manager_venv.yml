venv_manager:
  id: "venv-orchestrator-v1"
  version: "1.0.0"
  description: "Directives for creating, updating, and syncing the Python virtual environment."

# 1. Environment Specifications
specs:
  python_version: "3.11+" 
  venv_dir: ".venv"
  requirements_file: "requirements.txt"
  system_dependencies:
    - "python3-venv"
    - "python3-pip"
    - "libffi-dev" # Required for some crypto/auth libraries

# 2. Core Dependencies (Synced with Slalom Framework)
dependencies:
  required:
    - "pydantic"          # Data validation
    - "pydantic-settings" # Environment management
    - "httpx"             # Async HTTP for Gemini API
    - "pyyaml"            # Parsing these YAML files
    - "rich"              # ADHD-friendly terminal formatting
  dev:
    - "pytest"            # Testing
    - "pytest-mock"       # Mocking
    - "black"             # Formatting

# 3. Agent Execution Logic
workflow_directives:
  - "Check: Verify if .venv/bin/activate exists."
  - "Initialization: If missing, run 'python3 -m venv .venv'."
  - "Update: If requirements.txt changes, run 'pip install -r requirements.txt'."
  - "Pruning: Remove unused packages not listed in the dependencies block."

# 4. ADHD-Friendly CLI Output (The "Quick-Start")
cli_output:
  activation_cmd: "source .venv/bin/activate"
  status_icons:
    ready: "🟢 Environment Active"
    missing: "🔴 Venv Missing - Run 'tio-cli venv init'"
    outdated: "🟡 Sync Required - Run 'tio-cli venv sync'"
  
  # Minimalist summary for terminal
  summary_template: |
    **VENV STATUS**
    - **OS:** Debian 13 (Trixie)
    - **Python:** {sys_version}
    - **Packages:** {package_count} installed
    - **Active:** {is_active}