id: quick_reference.visual_bugs
name: Visual Bugs Quick Reference
description: Standards for identifying and reporting visual interface issues.
content:
  definition: Issues with graphical user interfaces (GUI) fixable via HTML/CSS.
  examples:
    - Layout framework problems (misalignment).
    - Responsive design issues (mobile vs. desktop display).
    - Overlapping or cut-off text/elements.
  repetition_rule:
    policy: Submit ONLY ONCE.
    requirement: Mention other affected URLs/pages in the single report.
  functional_upgrade:
    criteria: Upgrade if it PREVENTS functionality.
    exception: Stay visual if an easy/intuitive alternative path exists.
  documentation:
    screenshots: Always required.
    screencasts: Required if an action triggers the issue.
  responsive_checks:
    - Inconsistent scaling.
    - Illegible text.
    - Tap targets too small.
    - Unintended horizontal scrolling.
  tools:
    - Google Chrome Lighthouse (evaluates mobile usability).
