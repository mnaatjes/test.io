title: "A quick overview of the information you need before you start testing"
metadata:
  author: "Nikolas Fantoni"
  updated: "4 months ago"
  source: "Test IO Academy"

content:
  welcome:
    text: "Welcome to the tester community! This guide covers the basics for success in the onboarding course."
  
  motivation:
    role: "Testers simulate real users to find development errors (bugs), validate implementations, and check product health against requirements."
    platform: "Test IO handles crowd-testing for web, mobile, and IoT products."

  tester_academy:
    description: "Centralized knowledge base organized into collections. Key resource for general rules and standard procedures."

  onboarding_courses:
    location: "Dashboard or Learning Portal."
    requirement: "Mandatory to see real customer cycles and receive payment. No previous experience required."

  onboarding_interface:
    dashboard_sections:
      - "Reproductions"
      - "Tests and Opportunities"
    mandatory_modules:
      - "Add languages"
      - "Add devices"
      - exploratory_testing_course:
          - "Bug Types"
          - "How to find bugs?"
          - "Bug Report Attachments"
          - "Bug Reports"
    certification: "Completion grants 'Certified Exploratory Tester' status."
    reproduction_course: "Optional but recommended for fast earning."
    progression:
      current: "Onboarding Phase"
      next: "Greenhorn Phase (unlocks more tasks and earning opportunities)"

  recommended_articles:
    - "Bug Report Requirements"
    - "Functional Bugs"
    - "Content Bugs"
    - "Visual Bugs"
    - "Bug Report Attachments"
    - "Screenshots"
    - "Screencasts"
    - "Setting Up Your Workstation"
    - "Common mistakes in Bug Reports"
    - "Common mistakes in Attachments"
    - "Educational Material"

  related_articles:
