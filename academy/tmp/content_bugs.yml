topic: Content Bugs
summary: Learn what content bugs are, typical examples, reporting rules, and the distinction between broken and placeholder images.
author: Markus
updated: over 10 months ago
definition:
  core_concept: Relate to the actual content of websites or apps (text, labels, pictures, videos, icons, links, data, etc.).
  examples:
    - Broken links or images (404s).
    - Defective redirections.
    - Missing text (e.g., empty tooltips).
    - Missing content (e.g., empty content area, inconsistency in tooltips).
    - Missing translations (e.g., French labels on an English site).
    - Missing products in search results (when search function works).
    - Missing data.
repetitive_problems_rule:
  policy: Submit ONLY ONCE even if it occurs on multiple URLs, links, or pages.
  requirement: State in the single report that other instances are also concerned.
  rejection: Individual bug reports for every occurrence will be rejected.
  reason: Customer only needs one reference to investigate and solve for all occurrences.
functional_upgrade:
  criteria:
    - Report as functional if it PREVENTS functionality.
    - Report as functional (typically LOW) if it occurs in a functional component (navigation menu, header, footer, or breadcrumbs).
  exception: Remains content if functionality is easily/intuitively reachable via a different path/option.
documentation:
  screenshots: Mandatory for all content reports.
  reference: See "Bug Report Requirements" article.
out_of_scope:
  - Spelling problems.
  - Dummy text or missing content on staging environments (often intentional).
image_guide:
  broken_images:
    indicators: [Error icon, Blank space, Broken image symbol]
    causes: [Incorrect URLs, Server problems, File corruption, Network issues]
  placeholder_images:
    definition: Intentionally used as temporary visual representations until actual images are available.
    indicators: [Geometric shapes, Solid colors, Icons, Grey boxes with "Image" text]
    status: NOT a bug (serves a temporary purpose).
